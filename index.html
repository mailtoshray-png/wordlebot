<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordle Solver — 3b1b Style</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-layer"></div>

    <main class="stage">
      <section class="board-block">
        <div class="panel-title">
          <span class="muted"># Possibilities</span>
          <span class="slash">/</span>
          <span class="accent">Uncertainty</span>
        </div>
        <div id="board" class="board" aria-label="Wordle board"></div>
        <div id="mini-bars" class="mini-bars"></div>
      </section>

      <section class="picks-block" id="picks-block">
        <div id="picks-panel">
          <div class="panel-title panel-title--right">
            <span>Top picks</span>
            <span class="accent">E[Info.]</span>
          </div>
          <ol id="best-guesses" class="picks"></ol>
          <div id="progress" class="progress" hidden>
            <div class="progress__bar"></div>
            <span class="progress__label">Computing expected score…</span>
          </div>
        </div>
        <div id="analysis-panel" class="analysis" hidden>
          <div id="analysis-cards" class="analysis-cards"></div>
        </div>
      </section>
    </main>

    <div class="control-bar">
      <div class="control-group">
        <span id="mode-label" class="control-text">Solver</span>
        <span id="remaining-count" class="control-text">—</span>
      </div>
      <div class="input-row">
        <input
          id="guess-input"
          class="guess-input"
          type="text"
          maxlength="5"
          placeholder="Type guess"
          aria-label="Guess input"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="enter" class="btn">Enter</button>
        <button id="apply" class="btn btn--accent" disabled>Apply</button>
        <button id="analyze" class="btn btn--accent" hidden>Analyze</button>
      </div>
      <div id="custom-controls" class="input-row" hidden>
        <input
          id="secret-input"
          class="guess-input guess-input--secret"
          type="text"
          maxlength="5"
          placeholder="Set secret"
          aria-label="Secret word input"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="set-secret" class="btn btn--accent">Set Secret</button>
      </div>
      <div class="control-group">
        <label class="control-text" for="mode-select">Mode</label>
        <select id="mode-select" class="mode-select" aria-label="Mode select">
          <option value="solver">Solver</option>
          <option value="play">Play</option>
          <option value="custom">Custom</option>
          <option value="analyzer">Analyzer</option>
        </select>
        <button id="reset" class="btn">Reset</button>
        <button id="random-answer" class="btn btn--ghost">New Secret</button>
        <button id="reveal-answer" class="btn btn--ghost">Reveal</button>
        <span id="secret-display" class="control-text">Secret: —</span>
      </div>
    </div>

    <div class="hint" id="pattern-hint">
      Solver mode: enter a guess, then click tiles to set colors, then press Apply.
    </div>

    <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>

    <script src="app.js"></script>
  </body>
</html>
